<!DOCTYPE html>
<html>
<head>
  <title>FaceCalm Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>FaceCalm - Stress Detection</h1>

    <video id="video" autoplay playsinline></video>

    <button id="startBtn">Begin Scan</button>

    <p id="status">Press Begin Scan</p>
  </div>

  <!-- TensorFlow -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

  <!-- Face Landmarks -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.5/dist/face-landmarks-detection.min.js"></script>

  <!-- MediaPipe FaceMesh -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

  <!-- Our Script -->
  <script src="script.js"></script>

</body>
</html>
